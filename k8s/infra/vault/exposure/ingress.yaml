apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: vault
  namespace: vault
spec:
  endpoints:
    - dnsName: "vault.j6js.com"
      recordType: "CNAME"
      targets:
        - "hl.j6js.com"
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: vault-gw
  namespace: vault
spec:
  gatewayClassName: envoy
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "vault.j6js.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: vault-tls
            kind: Secret
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-tls
  namespace: vault
spec:
  secretName: vault-tls # this Secret is what the Gateway references
  dnsNames:
    - vault.j6js.com
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vault-route
  namespace: vault
spec:
  parentRefs:
    - name: vault-gw
      namespace: vault
  hostnames:
    - vault.j6js.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vault
          port: 8200
