apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-db-credentials
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: authentik-db-credentials
    template:
      type: Opaque
      data:
        POSTGRES_HOST: "{{ .host }}"
        POSTGRES_PORT: "{{ .port }}"
        POSTGRES_DB: "{{ .dbname }}"
        POSTGRES_USER: "{{ .username }}"
        POSTGRES_PASSWORD: "{{ .password }}"
        AUTHENTIK_POSTGRESQL__HOST: "{{ .host }}"
        AUTHENTIK_POSTGRESQL__PORT: "{{ .port }}"
        AUTHENTIK_POSTGRESQL__NAME: "{{ .dbname }}"
        AUTHENTIK_POSTGRESQL__USER: "{{ .username }}"
        AUTHENTIK_POSTGRESQL__PASSWORD: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/cnpg/authentik
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/cnpg/authentik
        property: password
    - secretKey: host
      remoteRef:
        key: secret/data/cnpg/authentik
        property: host
    - secretKey: port
      remoteRef:
        key: secret/data/cnpg/authentik
        property: port
    - secretKey: dbname
      remoteRef:
        key: secret/data/cnpg/authentik
        property: dbname
