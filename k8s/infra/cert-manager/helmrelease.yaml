apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 5m
  releaseName: eg
  chart:
    spec:
      chart: cert-manager
      sourceRef:
        kind: HelmRepository
        name: cert-manager
      version: 1.20.2
      interval: 1h
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    installCRDs: true
    config:
      enableGatewayAPI: true
      apiVersion: "controller.config.cert-manager.io/v1alpha1"
      kind: ControllerConfiguration
