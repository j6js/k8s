apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx-gateway-fabric
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: nginx-gateway-fabric
      version: "2.6.0"
      sourceRef:
        kind: HelmRepository
        name: nginx-gateway-fabric
        namespace: kube-system
  values:
    nginxGatewayFabric:
      service:
        type: LoadBalancer