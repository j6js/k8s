apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-external-secrets-config
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 30s
  timeout: 3m
  prune: true
  wait: false
  path: ./k8s/infra/external-secrets/config
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra-external-secrets
    - name: infra-vault
