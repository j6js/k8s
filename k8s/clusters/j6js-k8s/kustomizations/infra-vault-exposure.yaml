apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-vault-exposure
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 30s
  timeout: 3m
  prune: true
  wait: false
  path: ./k8s/infra/vault/exposure
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra-vault
    - name: infra-cert-manager-config
    - name: infra-envoy-gateway-config
