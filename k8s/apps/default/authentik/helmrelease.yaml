apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: authentik
      version: "2026.2.3"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: default
      interval: 1h
  values:
    authentik:
      existingSecret:
        secretName: authentik-secret-key
    global:
      env:
        - name: AUTHENTIK_ERROR_REPORTING__ENABLED
          value: "false"
      envFrom:
        - secretRef:
            name: authentik-db-credentials
    postgresql:
      enabled: false
    server:
      route:
        main:
          enabled: true
          parentRefs:
            - name: authentik-gw
              namespace: default
          hostnames:
            - authentik.j6js.com
