version: '3'

tasks:
  init:
    cmds:
      - terragrunt init
  deploy:
    cmds:
      - if: "[ -d .terraform ]"
        task: init
      - terragrunt apply -auto-approve
  bootstrap:
    cmds:
      - task: deploy # bootstrap is the same as deploy, it's terraform after all.
  test:
    cmds:
      - terragrunt validate