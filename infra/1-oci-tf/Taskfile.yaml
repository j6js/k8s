version: '3'

tasks:
  init:
    cmds:
      - task: get_talos_img
        if: "[ ! -f talos/oracle-arm64.qcow2 ]"
      - terragrunt init
  deploy:
    cmds:
      - if: "[ -d .terraform ]"
        task: init
      - task: get_talos_img
        if: "[ ! -f talos/oracle-arm64.qcow2 ]"
      - terragrunt apply -auto-approve
  bootstrap:
    cmds:
      - task: deploy # bootstrap is the same as deploy, it's terraform after all.
  test:
    cmds:
      - terragrunt validate

  get_talos_img:
    cmds:
      - cmd: mkdir talos
        if: "[ ! -d talos ]"
        # Image is the default one that comews with the iscsi tools, and util-linux-tools. as required for Longhorn. 
      - cmd: curl -L -o talos/oracle-arm64.qcow2 https://factory.talos.dev/image/613e1592b2da41ae5e265e8789429f22e121aab91cb4deb6bc3c0b6262961245/v$(cat config/config.yaml | yq .versions.talos)/oracle-arm64.qcow2
        if: "[ ! -f talos/oracle-arm64.qcow2 ]"