# ExternalSecret for CloudNativePG superuser credentials via Vault Database Secrets engine.
#
# This uses Vault's database secrets engine to generate dynamic, auto-rotating
# PostgreSQL superuser credentials. Each sync creates a new PG role with a TTL.
#
# Prerequisites:
#   1. Vault database secrets engine configured for this CNPG cluster
#      (see argocd/manifests/vault/config/README.md)
#   2. A Vault role named "cnpg-superuser" that creates a PG superuser
#   3. A K8s auth role "cnpg-superuser" bound to the external-secrets SA
#
# The CNPG Cluster spec references this secret via:
#   spec.superuserSecret.name: cnpg-superuser
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-superuser
  namespace: cnpg
spec:
  refreshInterval: 30m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cnpg-superuser
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: database/creds/cnpg-superuser
        property: username
    - secretKey: password
      remoteRef:
        key: database/creds/cnpg-superuser
        property: password
