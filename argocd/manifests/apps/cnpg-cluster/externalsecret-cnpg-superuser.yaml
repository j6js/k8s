# Example: ExternalSecret for CloudNativePG superuser credentials
# Place this in the same namespace as your CNPG Cluster resource.
# The secret key names match what CNPG expects for .spec.superuserSecret.
#
# Prerequisites:
#   1. A secret must exist in Vault at: secret/data/cnpg/<cluster-name>/superuser
#      with keys: username, password
#   2. The CNPG Cluster spec references this secret via:
#      spec.superuserSecret.name: cnpg-superuser
#
# To store credentials in Vault:
#   vault kv put secret/cnpg/my-cluster/superuser username=postgres password=<generated>
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-superuser
  namespace: default  # Change to your CNPG cluster namespace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cnpg-superuser
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      engineVersion: v2
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/cnpg/my-cluster/superuser  # Change to your cluster path
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/cnpg/my-cluster/superuser  # Change to your cluster path
        property: password
