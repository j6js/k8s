apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg
  namespace: cnpg
spec:
  # Image (needs to be updated manually etc): https://github.com/cloudnative-pg/postgres-containers/pkgs/container/postgresql
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie
  instances: 3
  storage:
    size: 10Gi
    storageClass: longhorn
  enableSuperuserAccess: true
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  monitoring:
    enablePodMonitor: true
  managed:
    roles:
      - name: authentik
        connectionLimit: -1	
        ensure: present	
        inherit: true
        login: true
        passwordSecret:
          name: cnpg-authentik