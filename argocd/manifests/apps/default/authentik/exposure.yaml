apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: authentik
  namespace: default
spec:
  endpoints:
    - dnsName: authentik.j6js.com
      recordType: CNAME
      targets:
        - hl.j6js.com
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: authentik-tls
  namespace: default
spec:
  dnsNames:
    - authentik.j6js.com
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt
  secretName: authentik-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: authentik-gw
  namespace: default
spec:
  gatewayClassName: envoy
  listeners:
    - name: https
      hostname: authentik.j6js.com
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: authentik-tls
