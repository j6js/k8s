apiVersion: v1
kind: Service
metadata:
  name: wazuh-agents
  namespace: wazuh
  labels:
    app: wazuh-manager
spec:
  type: NodePort
  selector:
    app: wazuh-manager
    node-type: worker
  ports:
    - name: agents-events
      port: 1514
      targetPort: 1514
      nodePort: 31514
---
apiVersion: v1
kind: Service
metadata:
  name: wazuh-registration
  namespace: wazuh
  labels:
    app: wazuh-manager
spec:
  type: NodePort
  selector:
    app: wazuh-manager
    node-type: master
  ports:
    - name: registration
      port: 1515
      targetPort: 1515
      nodePort: 31515
