apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vault-route
  namespace: vault
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: Gateway
      name: public-gateway
      namespace: gateway
      sectionName: vault-https
  hostnames:
    - vault.j6js.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: infra-vault-active
          port: 8200
---
