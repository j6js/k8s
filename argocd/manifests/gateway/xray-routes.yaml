apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: xray-tcp
  namespace: xray
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public-gateway
      namespace: gateway
      sectionName: xray-tcp
  rules:
    - backendRefs:
        - name: 3x-ui
          port: 10000
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: UDPRoute
metadata:
  name: xray-udp
  namespace: xray
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public-gateway
      namespace: gateway
      sectionName: xray-udp
  rules:
    - backendRefs:
        - name: 3x-ui
          port: 8443
