apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-tls
  namespace: gateway
spec:
  secretName: vault-tls
  dnsNames:
    - vault.j6js.com
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
