apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: http://infra-vault-internal.vault.svc.cluster.local:8200
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: cnpg-superuser
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
