apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: authentik-generated
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        postgres-password: "{{ .postgres_password }}"
        secret-key: "{{ .secret_key }}"
  data:
    - secretKey: postgres_password
      remoteRef:
        key: cnpg/role/authentik
        property: password
    - secretKey: secret_key
      remoteRef:
        key: secrets/data/authentik
        property: secretKey
