apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-generated
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: authentik-generated
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        AUTHENTIK_SECRET_KEY: "{{ .ak_secret_key }}"
        AUTHENTIK_POSTGRESQL__HOST: "{{ .ak_postgresql_host }}"
        AUTHENTIK_POSTGRESQL__NAME: "{{ .ak_postgresql_name }}"
        AUTHENTIK_POSTGRESQL__USER: "{{ .ak_postgresql_user }}"
        AUTHENTIK_POSTGRESQL__PORT: "{{ .ak_postgresql_port }}"
        AUTHENTIK_POSTGRESQL__PASSWORD: "{{ .ak_postgresql_password }}"
        AUTHENTIK_EMAIL__HOST: "{{ .ak_email_host }}"
        AUTHENTIK_EMAIL__PORT: "{{ .ak_email_port }}"
        AUTHENTIK_EMAIL__USERNAME: "{{ .ak_email_user }}"
        AUTHENTIK_EMAIL__PASSWORD: "{{ .ak_email_password }}"
        AUTHENTIK_EMAIL__FROM: "{{ .ak_email_user }}"

  data:
    - secretKey: ak_secret_key
      remoteRef:
        key: authentik
        property: AUTHENTIK_SECRET_KEY
    - secretKey: ak_postgresql_host
      remoteRef:
        key: authentik
        property: AUTHENTIK_POSTGRESQL__HOST
    - secretKey: ak_postgresql_name
      remoteRef:
        key: authentik
        property: AUTHENTIK_POSTGRESQL__NAME
    - secretKey: ak_postgresql_user
      remoteRef:
        key: authentik
        property: AUTHENTIK_POSTGRESQL__USER
    - secretKey: ak_postgresql_port
      remoteRef:
        key: authentik
        property: AUTHENTIK_POSTGRESQL__PORT
    - secretKey: ak_postgresql_password
      remoteRef:
        key: cnpg/role/authentik
        property: password
    - secretKey: ak_email_host
      remoteRef:
        key: authentik
        property: AUTHENTIK_EMAIL__HOST
    - secretKey: ak_email_port
      remoteRef:
        key: authentik
        property: AUTHENTIK_EMAIL__PORT
    - secretKey: ak_email_user
      remoteRef:
        key: email/noreply
        property: user
    - secretKey: ak_email_password
      remoteRef:
        key: email/noreply
        property: password