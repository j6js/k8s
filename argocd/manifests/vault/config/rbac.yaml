apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-config
  namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-config-tokenreview
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault-config
    namespace: vault
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-config-token
  namespace: vault
  annotations:
    kubernetes.io/service-account.name: vault-config
type: kubernetes.io/service-account-token
