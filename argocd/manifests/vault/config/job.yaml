apiVersion: batch/v1
kind: Job
metadata:
  name: vault-config
  namespace: vault
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: vault-config
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-vault
          image: busybox:1.37
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Vault to be ready..."
              until wget -qO- http://infra-vault-internal.vault.svc.cluster.local:8200/v1/sys/health 2>/dev/null; do
                echo "Vault not ready, retrying in 5s..."
                sleep 5
              done
              echo "Vault is ready."
      containers:
        - name: vault-config
          image: alpine:3.22
          command:
            - /bin/sh
            - -c
            - |
              set -e

              # Install jq for JSON construction
              apk add --no-cache jq curl > /dev/null 2>&1

              VAULT_ADDR=http://infra-vault-internal.vault.svc.cluster.local:8200
              VAULT_TOKEN="$(cat /vault/token/root-token)"
              SA_TOKEN="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
              CA_CERT="$(cat /var/run/secrets/kubernetes.io/serviceaccount/ca.crt)"

              vault_post() {
                local path="$1"
                local data="$2"
                curl -sf -X POST \
                  -H "X-Vault-Token: $VAULT_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "$data" \
                  "$VAULT_ADDR$path" || true
              }

              vault_put() {
                local path="$1"
                local data="$2"
                curl -sf -X PUT \
                  -H "X-Vault-Token: $VAULT_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "$data" \
                  "$VAULT_ADDR$path" || true
              }

              echo "Enabling KV v2 secrets engine..."
              vault_post /v1/sys/mounts/secret \
                '{"type":"kv","options":{"version":"2"}}'

              echo "Enabling Kubernetes auth method..."
              vault_post /v1/sys/auth/kubernetes \
                '{"type":"kubernetes"}'

              echo "Configuring Kubernetes auth..."
              K8S_CONFIG=$(jq -n \
                --arg host "https://kubernetes.default.svc:443" \
                --arg jwt "$SA_TOKEN" \
                --arg ca "$CA_CERT" \
                --arg issuer "https://kubernetes.default.svc.cluster.local" \
                '{kubernetes_host:$host,token_reviewer_jwt:$jwt,kubernetes_ca_cert:$ca,issuer:$issuer}')
              vault_post /v1/auth/kubernetes/config "$K8S_CONFIG"

              echo "Writing cnpg-reader policy..."
              vault_put /v1/sys/policies/acl/cnpg-reader \
                '{"policy":"path \"secret/data/cnpg/*\" { capabilities = [\"read\", \"list\"] }\npath \"secret/metadata/cnpg/*\" { capabilities = [\"read\", \"list\"] }\npath \"secret/metadata\" { capabilities = [\"list\"] }\n"}'

              echo "Writing external-secrets policy..."
              vault_put /v1/sys/policies/acl/external-secrets \
                '{"policy":"path \"secret/data/*\" { capabilities = [\"read\", \"list\"] }\npath \"secret/metadata/*\" { capabilities = [\"read\", \"list\"] }\n"}'

              echo "Creating K8s auth role for external-secrets..."
              vault_post /v1/auth/kubernetes/role/external-secrets \
                '{"bound_service_account_names":"external-secrets","bound_service_account_namespaces":"external-secrets","policies":"external-secrets","ttl":"1h"}'

              echo "Creating K8s auth role for CNPG..."
              vault_post /v1/auth/kubernetes/role/cnpg-reader \
                '{"bound_service_account_names":"*","bound_service_account_namespaces":"*","policies":"cnpg-reader","ttl":"1h"}'

              echo "Vault configuration complete."
          volumeMounts:
            - name: vault-token
              mountPath: /vault/token
              readOnly: true
      volumes:
        - name: vault-token
          secret:
            secretName: vault-root-token
