apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vaultwarden-generated
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vaultwarden-generated
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        PGUSER: "{{ .db_user }}"
        PGPASSWORD: "{{ .db_password }}"
        PGDATABASE: vaultwarden
        DATABASE_URL: "postgres://:@cnpg-rw.cnpg.svc.cluster.local:5432/vaultwarden"
        PUSH_ENABLED: "true"
        PUSH_INSTALLATION_ID: "{{ .installation_id }}"
        PUSH_INSTALLATION_KEY: "{{ .installation_key }}"
        SMTP_HOST: "{{ .email_host }}"
        SMTP_PORT: "{{ .email_port }}"
        SMTP_USERNAME: "{{ .email_user }}"
        SMTP_PASSWORD: "{{ .email_password }}"
        SMTP_FROM: "{{ .email_user }}" # if user isn't a valid email address, change this.
        SMTP_FROM_NAME: "Vaultwarden (noreply)"
        SMTP_SECURITY: "{{ if eq .email_port \"465\" }}ssl{{ else }}starttls{{ end }}"
  data:
    - secretKey: db_user
      remoteRef:
        key: cnpg/role/vaultwarden
        property: username
    - secretKey: db_password
      remoteRef:
        key: cnpg/role/vaultwarden
        property: password
    - secretKey: installation_id
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: vaultwarden
        metadataPolicy: None
        nullBytePolicy: Ignore
        property: installation_id
    - secretKey: installation_key
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: vaultwarden
        metadataPolicy: None
        nullBytePolicy: Ignore
        property: installation_key
    - secretKey: email_user
      remoteRef:
        key: email/noreply
        property: user
    - secretKey: email_password
      remoteRef:
        key: email/noreply
        property: password
    - secretKey: email_host
      remoteRef:
        key: vaultwarden
        property: email_host
    - secretKey: email_port
      remoteRef:  
        key: vaultwarden
        property: email_port