apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-authentik-to-vault
  namespace: cnpg-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cnpg-authentik-vault-sync
    template:
      type: Opaque
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/cnpg/authentik
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/cnpg/authentik
        property: password
    - secretKey: host
      remoteRef:
        key: secret/data/cnpg/authentik
        property: host
    - secretKey: port
      remoteRef:
        key: secret/data/cnpg/authentik
        property: port
    - secretKey: dbname
      remoteRef:
        key: secret/data/cnpg/authentik
        property: dbname
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: cnpg-authentik-to-vault
  namespace: cnpg-system
spec:
  secretStoreRefs:
    - name: vault-backend
      kind: ClusterSecretStore
  selector:
    secret:
      name: cnpg-cluster-authentik
  template:
    engineVersion: v2
    data:
      secret/data/cnpg/authentik: |
        {
          "username": "{{ .username }}",
          "password": "{{ .password }}",
          "host": "cnpg-pooler.cnpg-system.svc.cluster.local",
          "port": "5432",
          "dbname": "authentik"
        }
