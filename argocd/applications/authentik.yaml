apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: "2025.12.0"
    helm:
      releaseName: authentik
      valuesObject:
        authentik:
          secretKey:
            existingSecret: authentik-secret-key
            existingSecretKey: authentik-secret-key
          postgresql:
            host: cnpg-rw.cnpg.svc.cluster.local
            port: 5432
            name: authentik
            user: authentik
            password:
              existingSecret: authentik-db-credentials
              existingSecretKey: password
        server:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
        worker:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
        postgresql:
          enabled: false
        redis:
          enabled: true
          architecture: standalone
          auth:
            enabled: false
          master:
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 128Mi
        service:
          type: ClusterIP
        ingress:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
