apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: ghcr.io/prometheus-community/charts
    chart: kube-prometheus-stack
    targetRevision: "85.3.3"
    helm:
      releaseName: kube-prometheus-stack
      valuesObject:
        grafana:
          envFromSecret: grafana-authentik-oauth
          grafana.ini:
            server:
              root_url: https://grafana.j6js.com
            auth.generic_oauth:
              enabled: true
              name: authentik
              allow_sign_up: true
              allow_assign_grafana_admin: true
              client_id: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
              client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
              scopes: openid email profile
              auth_url: https://auth.j6js.com/application/o/authorize/
              token_url: https://auth.j6js.com/application/o/token/
              api_url: https://auth.j6js.com/application/o/userinfo/
              use_pkce: true
              role_attribute_path: contains(groups[*], 'Grafana Admin') && 'Admin' || contains(groups[*], 'Grafana') && 'Editor' || 'Viewer'
          persistence:
            enabled: true
            type: sts
            accessModes:
              - ReadWriteOnce
            size: 500Mi
            storageClassName: longhorn
            finalizers: 
              - kubernetes.io/pvc-protection
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL
              label: grafana_dashboard
              labelValue: "1"
              provider:
                foldersFromFilesStructure: true
            datasources:
              enabled: true
              searchNamespace: ALL
              label: grafana_datasource
              labelValue: "1"
        prometheus:
          prometheusSpec:
            replicas: 2
            podAntiAffinity: hard
            podMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            scrapeConfigSelectorNilUsesHelmValues: false
            serviceMonitorNamespaceSelector: {}
            podMonitorNamespaceSelector: {}
            ruleNamespaceSelector: {}
            probeNamespaceSelector: {}
            scrapeConfigNamespaceSelector: {}
            serviceMonitorSelector: {}
            podMonitorSelector: {}
            ruleSelector: {}
            probeSelector: {}
            scrapeConfigSelector: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: o11y # Observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
