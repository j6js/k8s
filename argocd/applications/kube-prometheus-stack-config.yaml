apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/j6js/k8s.git
    targetRevision: main
    path: argocd/manifests/kube-prometheus-stack/config
  destination:
    server: https://kubernetes.default.svc
    namespace: o11y # Observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
