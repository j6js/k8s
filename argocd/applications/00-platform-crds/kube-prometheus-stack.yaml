apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
    argocd.argoproj.io/sync-wave: "-20"
spec:
  project: default
  source:
    repoURL: ghcr.io/prometheus-community/charts
    chart: kube-prometheus-stack
    targetRevision: "86.1.0"
    helm:
      releaseName: kube-prometheus-stack
      valuesObject:
        alertmanager:
          alertmanagerSpec:
            secrets:
              - incidentio-alertmanager
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi
          config:
            route:
              group_by: ['alertname']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              receiver: 'null'
              routes:
                - matchers:
                    - 'severity = critical'
                  receiver: 'incidentio-notifications'
            receivers:
              - name: 'null' # alertmanager required this, it's just an alert black hole
              - name: incidentio-notifications
                incidentio_configs:
                  - url_file: /etc/alertmanager/secrets/incidentio-alertmanager/api_url
                    alert_source_token_file: /etc/alertmanager/secrets/incidentio-alertmanager/alert_source_token
        grafana:
          envFromSecret: grafana-authentik-oauth
          grafana.ini:
            server:
              root_url: https://grafana.j6js.com
            auth.generic_oauth:
              enabled: true
              name: authentik
              allow_sign_up: true
              allow_assign_grafana_admin: true
              client_id: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
              client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
              scopes: openid email profile
              auth_url: https://auth.j6js.com/application/o/authorize/
              token_url: https://auth.j6js.com/application/o/token/
              api_url: https://auth.j6js.com/application/o/userinfo/
              use_pkce: true
              role_attribute_path: contains(groups[*], 'Grafana Admin') && 'Admin' || contains(groups[*], 'Grafana') && 'Editor' || 'Viewer'
          persistence:
            enabled: true
            type: sts
            accessModes:
              - ReadWriteOnce
            size: 500Mi
            storageClassName: longhorn
            finalizers: 
              - kubernetes.io/pvc-protection
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL
              label: grafana_dashboard
              labelValue: "1"
              provider:
                foldersFromFilesStructure: true
            datasources:
              enabled: true
              searchNamespace: ALL
              label: grafana_datasource
              labelValue: "1"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
        kube-state-metrics:
          customResourceState:
            enabled: true
            config:
              kind: CustomResourceStateMetrics
              spec:
                resources:
                  - groupVersionKind:
                      group: gateway.networking.k8s.io
                      kind: Gateway
                      version: v1
                    metricNamePrefix: gatewayapi_gateway
                    labelsFromPath:
                      name: [metadata, name]
                      namespace: [metadata, namespace]
                    metrics:
                      - name: info
                        help: Gateway information
                        each:
                          type: Info
                          info:
                            labelsFromPath:
                              gatewayclass_name: [spec, gatewayClassName]
                      - name: created
                        help: Created timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, creationTimestamp]
                      - name: deleted
                        help: Deletion timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, deletionTimestamp]
                      - name: listener_info
                        help: Gateway listener information
                        each:
                          type: Info
                          info:
                            path: [spec, listeners]
                            labelsFromPath:
                              listener_name: [name]
                              port: [port]
                              protocol: [protocol]
                              hostname: [hostname]
                              tls_mode: [tls, mode]
                              allowed_routes_namespaces_from: [allowedRoutes, namespaces, from]
                      - name: status
                        help: Gateway status condition
                        each:
                          type: Gauge
                          gauge:
                            path: [status, conditions]
                            labelsFromPath:
                              type: [type]
                            valueFrom: [status]
                      - name: status_listener_attached_routes
                        help: Number of attached routes for a listener
                        each:
                          type: Gauge
                          gauge:
                            path: [status, listeners]
                            labelsFromPath:
                              listener_name: [name]
                            valueFrom: [attachedRoutes]
                      - name: status_address_info
                        help: Gateway address types and values
                        each:
                          type: Info
                          info:
                            path: [status, addresses]
                            labelsFromPath:
                              type: [type]
                              value: [value]
                  - groupVersionKind:
                      group: gateway.networking.k8s.io
                      kind: GatewayClass
                      version: v1
                    metricNamePrefix: gatewayapi_gatewayclass
                    labelsFromPath:
                      name: [metadata, name]
                    metrics:
                      - name: info
                        help: GatewayClass information
                        each:
                          type: Info
                          info:
                            labelsFromPath:
                              controller_name: [spec, controllerName]
                      - name: created
                        help: Created timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, creationTimestamp]
                      - name: deleted
                        help: Deletion timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, deletionTimestamp]
                      - name: status
                        help: GatewayClass status condition
                        each:
                          type: Gauge
                          gauge:
                            path: [status, conditions]
                            labelsFromPath:
                              type: [type]
                            valueFrom: [status]
                  - groupVersionKind:
                      group: gateway.networking.k8s.io
                      kind: HTTPRoute
                      version: v1
                    metricNamePrefix: gatewayapi_httproute
                    labelsFromPath:
                      name: [metadata, name]
                      namespace: [metadata, namespace]
                    metrics:
                      - name: created
                        help: Created timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, creationTimestamp]
                      - name: deleted
                        help: Deletion timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, deletionTimestamp]
                      - name: hostname_info
                        help: Hostname information
                        each:
                          type: Info
                          info:
                            path: [spec, hostnames]
                            labelsFromPath:
                              hostname: []
                      - name: parent_info
                        help: Parent references that the HTTPRoute wants to attach to
                        each:
                          type: Info
                          info:
                            path: [spec, parentRefs]
                            labelsFromPath:
                              parent_group: [group]
                              parent_kind: [kind]
                              parent_name: [name]
                              parent_namespace: [namespace]
                              parent_section_name: [sectionName]
                              parent_port: [port]
                      - name: status_parent_info
                        help: Parent references that the HTTPRoute is attached to
                        each:
                          type: Info
                          info:
                            path: [status, parents]
                            labelsFromPath:
                              controller_name: [controllerName]
                              parent_group: [parentRef, group]
                              parent_kind: [parentRef, kind]
                              parent_name: [parentRef, name]
                              parent_namespace: [parentRef, namespace]
                              parent_section_name: [parentRef, sectionName]
                              parent_port: [parentRef, port]
                  - groupVersionKind:
                      group: gateway.networking.k8s.io
                      kind: GRPCRoute
                      version: v1
                    metricNamePrefix: gatewayapi_grpcroute
                    labelsFromPath:
                      name: [metadata, name]
                      namespace: [metadata, namespace]
                    metrics:
                      - name: created
                        help: Created timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, creationTimestamp]
                      - name: deleted
                        help: Deletion timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, deletionTimestamp]
                      - name: parent_info
                        help: Parent references that the GRPCRoute wants to attach to
                        each:
                          type: Info
                          info:
                            path: [spec, parentRefs]
                            labelsFromPath:
                              parent_group: [group]
                              parent_kind: [kind]
                              parent_name: [name]
                              parent_namespace: [namespace]
                              parent_section_name: [sectionName]
                              parent_port: [port]
                      - name: status_parent_info
                        help: Parent references that the GRPCRoute is attached to
                        each:
                          type: Info
                          info:
                            path: [status, parents]
                            labelsFromPath:
                              controller_name: [controllerName]
                              parent_group: [parentRef, group]
                              parent_kind: [parentRef, kind]
                              parent_name: [parentRef, name]
                              parent_namespace: [parentRef, namespace]
                              parent_section_name: [parentRef, sectionName]
                              parent_port: [parentRef, port]
                  - groupVersionKind:
                      group: gateway.networking.k8s.io
                      kind: TCPRoute
                      version: v1alpha2
                    metricNamePrefix: gatewayapi_tcproute
                    labelsFromPath:
                      name: [metadata, name]
                      namespace: [metadata, namespace]
                    metrics:
                      - name: created
                        help: Created timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, creationTimestamp]
                      - name: deleted
                        help: Deletion timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, deletionTimestamp]
                      - name: parent_info
                        help: Parent references that the TCPRoute wants to attach to
                        each:
                          type: Info
                          info:
                            path: [spec, parentRefs]
                            labelsFromPath:
                              parent_group: [group]
                              parent_kind: [kind]
                              parent_name: [name]
                              parent_namespace: [namespace]
                              parent_section_name: [sectionName]
                              parent_port: [port]
                      - name: status_parent_info
                        help: Parent references that the TCPRoute is attached to
                        each:
                          type: Info
                          info:
                            path: [status, parents]
                            labelsFromPath:
                              controller_name: [controllerName]
                              parent_group: [parentRef, group]
                              parent_kind: [parentRef, kind]
                              parent_name: [parentRef, name]
                              parent_namespace: [parentRef, namespace]
                              parent_section_name: [parentRef, sectionName]
                              parent_port: [parentRef, port]
                  - groupVersionKind:
                      group: gateway.networking.k8s.io
                      kind: TLSRoute
                      version: v1
                    metricNamePrefix: gatewayapi_tlsroute
                    labelsFromPath:
                      name: [metadata, name]
                      namespace: [metadata, namespace]
                    metrics:
                      - name: created
                        help: Created timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, creationTimestamp]
                      - name: deleted
                        help: Deletion timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, deletionTimestamp]
                      - name: hostname_info
                        help: Hostname information
                        each:
                          type: Info
                          info:
                            path: [spec, hostnames]
                            labelsFromPath:
                              hostname: []
                      - name: parent_info
                        help: Parent references that the TLSRoute wants to attach to
                        each:
                          type: Info
                          info:
                            path: [spec, parentRefs]
                            labelsFromPath:
                              parent_group: [group]
                              parent_kind: [kind]
                              parent_name: [name]
                              parent_namespace: [namespace]
                              parent_section_name: [sectionName]
                              parent_port: [port]
                      - name: status_parent_info
                        help: Parent references that the TLSRoute is attached to
                        each:
                          type: Info
                          info:
                            path: [status, parents]
                            labelsFromPath:
                              controller_name: [controllerName]
                              parent_group: [parentRef, group]
                              parent_kind: [parentRef, kind]
                              parent_name: [parentRef, name]
                              parent_namespace: [parentRef, namespace]
                              parent_section_name: [parentRef, sectionName]
                              parent_port: [parentRef, port]
                  - groupVersionKind:
                      group: gateway.networking.k8s.io
                      kind: UDPRoute
                      version: v1alpha2
                    metricNamePrefix: gatewayapi_udproute
                    labelsFromPath:
                      name: [metadata, name]
                      namespace: [metadata, namespace]
                    metrics:
                      - name: created
                        help: Created timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, creationTimestamp]
                      - name: deleted
                        help: Deletion timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, deletionTimestamp]
                      - name: parent_info
                        help: Parent references that the UDPRoute wants to attach to
                        each:
                          type: Info
                          info:
                            path: [spec, parentRefs]
                            labelsFromPath:
                              parent_group: [group]
                              parent_kind: [kind]
                              parent_name: [name]
                              parent_namespace: [namespace]
                              parent_section_name: [sectionName]
                              parent_port: [port]
                      - name: status_parent_info
                        help: Parent references that the UDPRoute is attached to
                        each:
                          type: Info
                          info:
                            path: [status, parents]
                            labelsFromPath:
                              controller_name: [controllerName]
                              parent_group: [parentRef, group]
                              parent_kind: [parentRef, kind]
                              parent_name: [parentRef, name]
                              parent_namespace: [parentRef, namespace]
                              parent_section_name: [parentRef, sectionName]
                              parent_port: [parentRef, port]
                  - groupVersionKind:
                      group: gateway.networking.k8s.io
                      kind: BackendTLSPolicy
                      version: v1
                    metricNamePrefix: gatewayapi_backendtlspolicy
                    labelsFromPath:
                      name: [metadata, name]
                      namespace: [metadata, namespace]
                    metrics:
                      - name: created
                        help: Created timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, creationTimestamp]
                      - name: deleted
                        help: Deletion timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, deletionTimestamp]
                      - name: target_info
                        help: Target references that the BackendTLSPolicy wants to attach to
                        each:
                          type: Info
                          info:
                            path: [spec, targetRef]
                            labelsFromPath:
                              target_group: [group]
                              target_kind: [kind]
                              target_name: [name]
                              target_namespace: [namespace]
                  - groupVersionKind:
                      group: gateway.networking.k8s.io
                      kind: ListenerSet
                      version: v1
                    metricNamePrefix: gatewayapi_listenerset
                    labelsFromPath:
                      name: [metadata, name]
                      namespace: [metadata, namespace]
                    metrics:
                      - name: info
                        help: ListenerSet information
                        each:
                          type: Info
                          info:
                            labelsFromPath:
                              parent_name: [spec, parentRef, name]
                      - name: created
                        help: Created timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, creationTimestamp]
                      - name: deleted
                        help: Deletion timestamp
                        each:
                          type: Gauge
                          gauge:
                            path: [metadata, deletionTimestamp]
                      - name: listener_info
                        help: ListenerSet listener information
                        each:
                          type: Info
                          info:
                            path: [spec, listeners]
                            labelsFromPath:
                              listener_name: [name]
                              port: [port]
                              protocol: [protocol]
                              hostname: [hostname]
                              tls_mode: [tls, mode]
                              allowed_routes_namespaces_from: [allowedRoutes, namespaces, from]
                      - name: status
                        help: ListenerSet status condition
                        each:
                          type: Gauge
                          gauge:
                            path: [status, conditions]
                            labelsFromPath:
                              type: [type]
                            valueFrom: [status]
                      - name: status_listener_attached_routes
                        help: Number of attached routes for a listener
                        each:
                          type: Gauge
                          gauge:
                            path: [status, listeners]
                            labelsFromPath:
                              listener_name: [name]
                            valueFrom: [attachedRoutes]
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 256Mi
          rbac:
            extraRules:
              - apiGroups:
                  - gateway.networking.k8s.io
                resources:
                  - gateways
                  - gatewayclasses
                  - httproutes
                  - grpcroutes
                  - tcproutes
                  - tlsroutes
                  - udproutes
                  - backendtlspolicies
                  - listenersets
                verbs:
                  - list
                  - watch
        prometheus:
          prometheusSpec:
            replicas: 2
            podAntiAffinity: hard
            podMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            scrapeConfigSelectorNilUsesHelmValues: false
            serviceMonitorNamespaceSelector: {}
            podMonitorNamespaceSelector: {}
            ruleNamespaceSelector: {}
            probeNamespaceSelector: {}
            scrapeConfigNamespaceSelector: {}
            serviceMonitorSelector: {}
            podMonitorSelector: {}
            ruleSelector: {}
            probeSelector: {}
            scrapeConfigSelector: {}
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                cpu: 500m
                memory: 2Gi
        defaultRules:
          rules:
            kubeProxy: false # cilium replaces kube-proxy
            kubeScheduler:
              enabled: true
              serviceMonitor:
                https: true
                insecureSkipVerify: true
            kubeEtcd:
              enabled: true
              serviceMonitor:
                https: false
                port: http-metrics
        prometheus-node-exporter:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
        prometheusOperator:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
          admissionWebhooks:
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 50m
                memory: 64Mi
    
  destination:
    server: https://kubernetes.default.svc
    namespace: o11y # Observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
