apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-redis
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: docker.io/bitnamicharts
    chart: redis
    targetRevision: 25.5.3
    helm:
      releaseName: redis
      valuesObject:
        fullnameOverride: redis
        architecture: standalone
        auth:
          enabled: true
          existingSecret: redis-auth
          existingSecretPasswordKey: password
        master:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
          persistence:
            enabled: true
            storageClass: longhorn
            size: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: redis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
