apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-vault
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.32.0
    helm:
      valuesObject:
        injector:
          image:
            repository: hashicorp/vault-k8s
            tag: 1.7.4
            pullPolicy: IfNotPresent
          agentImage:
            repository: hashicorp/vault
            tag: 2.0.1
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
        serverTelemetry:
          serviceMonitor:
            enabled: true
          prometheusRules:
            enabled: true
        server:
          image:
            repository: hashicorp/vault
            tag: 2.0.1
            pullPolicy: IfNotPresent
          statefulSet:
            securityContext:
              container:
                runAsNonRoot: true
                runAsUser: 100
                capabilities:
                  add:
                    - IPC_LOCK
          logLevel: debug
          dataStorage:
            enabled: true
            storageClass: longhorn
            size: 1Gi
          standalone:
            enabled: false
          ha:
            enabled: true
            replicas: 3
            raft:
              enabled: true
              setNodeId: true
              config: |
                ui = true
                
                telemetry {
                  prometheus_retention_time = "30s"
                  disable_hostname = true  
                }
                
                listener "tcp" {
                  tls_disable = 1
                  address = "[::]:8200"
                  cluster_address = "[::]:8201"
                  telemetry = {
                    unauthenticated_metrics_access = true
                  }
                }

                storage "raft" {
                  path = "/vault/data"

                  retry_join {
                    leader_api_addr = "http://infra-vault-0.infra-vault-internal:8200"
                  }

                  retry_join {
                    leader_api_addr = "http://infra-vault-1.infra-vault-internal:8200"
                  }

                  retry_join {
                    leader_api_addr = "http://infra-vault-2.infra-vault-internal:8200"
                  }
                }

                seal "ocikms" {
                  auth_type_api_key = true
                }

                service_registration "kubernetes" {}
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          extraEnvironmentVars:
            VAULT_SEAL_TYPE: ocikms
            OCI_CONFIG_FILE: /vault/userconfig/vault-oci-kms/config
            OCI_PRIVATE_KEY_PATH: /vault/userconfig/vault-oci-kms/OCI_PRIVATE_KEY
          extraSecretEnvironmentVars:
            - envName: VAULT_OCIKMS_CRYPTO_ENDPOINT
              secretName: vault-oci-kms
              secretKey: VAULT_OCIKMS_CRYPTO_ENDPOINT
            - envName: VAULT_OCIKMS_MANAGEMENT_ENDPOINT
              secretName: vault-oci-kms
              secretKey: VAULT_OCIKMS_MANAGEMENT_ENDPOINT
            - envName: VAULT_OCIKMS_SEAL_KEY_ID
              secretName: vault-oci-kms
              secretKey: VAULT_OCIKMS_SEAL_KEY_ID
            - envName: OCI_REGION
              secretName: vault-oci-kms
              secretKey: OCI_REGION
            - envName: OCI_TENANCY_OCID
              secretName: vault-oci-kms
              secretKey: OCI_TENANCY_OCID
            - envName: OCI_tenancy_ocid
              secretName: vault-oci-kms
              secretKey: OCI_TENANCY_OCID
            - envName: OCI_USER_OCID
              secretName: vault-oci-kms
              secretKey: OCI_USER_OCID
            - envName: OCI_user_ocid
              secretName: vault-oci-kms
              secretKey: OCI_USER_OCID
            - envName: OCI_FINGERPRINT
              secretName: vault-oci-kms
              secretKey: OCI_FINGERPRINT
            - envName: OCI_fingerprint
              secretName: vault-oci-kms
              secretKey: OCI_FINGERPRINT
            - envName: OCI_PRIVATE_KEY
              secretName: vault-oci-kms
              secretKey: OCI_PRIVATE_KEY
          extraVolumes:
            - type: secret
              name: vault-oci-kms
          initVolumeMounts:
            - mountPath: /vault/userconfig/vault-oci-kms
              name: vault-oci-kms
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged # Vault 2.0 requires the IPC_LOCK thingy again, and PodSecurity doesn't like that in the default "restricted" mode. Waiting until the helm chart is actually updated (thanks HashiCorp).
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: vault-injector-webhook-config
      jqPathExpressions:
      - '.webhooks.[].clientConfig.caBundle'